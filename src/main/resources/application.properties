spring.application.name=Text-to-Learn

server.port=8080

# postgresql configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Spring JPA
spring.jpa.hibernate.ddl-auto=update 
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# OpenRouter key — used by both our custom AiService and Spring AI's OpenAI autoconfiguration
spring.ai.openai.api-key=${AI_API_KEY}
spring.ai.openai.base-url=https://openrouter.ai/api/v1
spring.ai.openai.chat.options.model=nvidia/nemotron-nano-9b-v2:free

# Keep legacy custom properties (used by AiService bean)
spring.ai.api-key=${AI_API_KEY}
spring.ai.openrouter.baseurl=https://openrouter.ai/api/v1
spring.ai.openrouter.model-name=nvidia/nemotron-nano-9b-v2:free

# Disable unused Spring AI OpenAI auto-configurations (audio/speech/transcription not needed)
spring.autoconfigure.exclude=org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiAudioTranscriptionAutoConfiguration

# YouTube Data API v3 key (Google Cloud Console → APIs & Services → Credentials)
YOUTUBE_API_KEY=${YOUTUBE_API_KEY}

# logging

logging.file.name=logs/application.log

# Session / Cookie configuration
# Session expires after 7 days of inactivity
server.servlet.session.timeout=7d
# Keep cookie on browser persistently for 7 days
server.servlet.session.cookie.max-age=7d
# HttpOnly prevents JavaScript from accessing the JSESSIONID cookie
server.servlet.session.cookie.http-only=true
# SameSite configuration (use 'none' for production cross-origin, 'lax' for local development)
server.servlet.session.cookie.same-site=${COOKIE_SAME_SITE:lax}
# Secure flag (use 'true' for production HTTPS, 'false' for local HTTP)
server.servlet.session.cookie.secure=${COOKIE_SECURE:false}
# Name of the session cookie (default is JSESSIONID, left as default for clarity)
server.servlet.session.cookie.name=JSESSIONID

# Enable support for X-Forwarded-* headers (essential for HTTPS behind Railway/Render proxy)
server.forward-headers-strategy=framework

# CORS Allowed Origins
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# Application URL (used by services/APIs like OpenRouter referer)
app.url=${APPLICATION_URL:http://localhost:8080}